packages:
  - app
  - automation
  - tests

# pnpm 11 native-build approval. Each listed dep is a legitimate transitive
# of the Solana / Next.js stack; postinstall scripts compile native bindings
# or download platform-specific binaries.
# Reviewed 2026-05-21: web3.js -> bigint-buffer + tiny-secp256k1; wallet
# adapter -> usb + blake-hash; Next.js -> esbuild + unrs-resolver;
# ws -> bufferutil + utf-8-validate; protobufjs builds its prebuilt JS.
allowBuilds:
  "@stellar/stellar-sdk": true
  bigint-buffer: true
  blake-hash: true
  bufferutil: true
  esbuild: true
  protobufjs: true
  tiny-secp256k1: true
  unrs-resolver: true
  usb: true
  utf-8-validate: true
