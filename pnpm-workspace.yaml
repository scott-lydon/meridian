packages:
  - app
  - automation
  - tests

# Pyth's @pythnetwork/solana-utils transitively pulls @solana/web3.js@1.77.4,
# which deep-imports rpc-websockets/dist/lib/client. Newer rpc-websockets
# (9.x) removed that subpath. The direct dep @solana/web3.js@1.98.4 needs
# rpc-websockets 9.x. Path-scoped override pins ONLY the 1.77.4 subtree to
# rpc-websockets 7.5.1; the 1.98.4 chain keeps its native 9.x.
overrides:
  "@solana/web3.js@1.77.4>rpc-websockets": "7.5.1"

# pnpm 11 native-build approval. Each listed dep is a legitimate transitive
# of the Solana / Next.js stack; postinstall scripts compile native bindings
# or download platform-specific binaries.
# Reviewed 2026-05-21: web3.js -> bigint-buffer + tiny-secp256k1; wallet
# adapter -> usb + blake-hash; Next.js -> esbuild + unrs-resolver;
# ws -> bufferutil + utf-8-validate; protobufjs builds its prebuilt JS.
allowBuilds:
  "@stellar/stellar-sdk": true
  bigint-buffer: true
  blake-hash: true
  bufferutil: true
  esbuild: true
  protobufjs: true
  tiny-secp256k1: true
  unrs-resolver: true
  usb: true
  utf-8-validate: true
