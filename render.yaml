services:
  - type: web
    name: meridian-automation
    runtime: node
    region: oregon
    plan: starter
    rootDir: automation
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TZ
        value: America/New_York
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: SOLANA_WS_URL
        value: wss://api.devnet.solana.com
      - key: SOLANA_CLUSTER
        value: devnet
      - key: USDC_MINT
        value: 4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU
      - key: PYTH_HERMES_URL
        value: https://hermes.pyth.network
      - key: PYTH_FEED_AAPL
        value: 5a207c4aa0114baecf852fcd9db9beb8ec715f2db48caa525dbd878fd416fb09
      - key: PYTH_FEED_MSFT
        value: 8f98f8267ddddeeb61b4fd11f21dc0c2842c417622b4d685243fa73b5830131f
      - key: PYTH_FEED_GOOGL
        value: 88d0800b1649d98e21b8bf9c3f42ab548034d62874ad5d80e1c1b730566d7f61
      - key: PYTH_FEED_AMZN
        value: 82c59e36a8e0247e15283748d6cd51f5fa1019d73fbf3ab6d927e17d9e357a7f
      - key: PYTH_FEED_NVDA
        value: 61c4ca5b9731a79e285a01e24432d57d89f0ecdd4cd7828196ca8992d5eafef6
      - key: PYTH_FEED_META
        value: 399f1e8f1c4a517859963b56f104727a7a3c7f0f8fee56d34fa1f72e5a4b78ef
      - key: PYTH_FEED_TSLA
        value: 42676a595d0099c381687124805c8bb22c75424dffcaa55e3dc6549854ebe20a
      # MERIDIAN_PROGRAM_ID: set after first devnet deploy
      # ADMIN_KEYPAIR_PATH, AUTOMATION_KEYPAIR_PATH: set as Render secret files
      # SLACK_WEBHOOK_URL: set in dashboard (optional)

  # Next.js frontend. Public devnet UI for placing trades. The admin/pass
  # gate at /admin unlocks the 🧪 DEV button + after-hours testing mode
  # toggle for trusted visitors only; everyone else sees normal product
  # rules. See app/src/lib/adminMode.ts for the rationale.
  - type: web
    name: meridian-app
    runtime: node
    region: oregon
    plan: starter
    rootDir: app
    # The frontend depends on the monorepo's pnpm workspace, so install
    # from the repo root and then build the app workspace. Render runs
    # buildCommand at the rootDir level by default, so cd back up first.
    buildCommand: cd .. && pnpm install --frozen-lockfile && cd app && pnpm build
    startCommand: pnpm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TZ
        value: America/New_York
      # Next.js binds to $PORT; Render sets this automatically. Listing it
      # explicitly here as a no-op-but-documented value so the deploy
      # contract is visible at the YAML layer.
      - key: HOSTNAME
        value: 0.0.0.0
      # All NEXT_PUBLIC_* values are inlined into the client bundle at
      # build time, so they must be set BEFORE buildCommand runs. Render
      # honours that ordering. These mirror app/.env.example.
      - key: NEXT_PUBLIC_SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: NEXT_PUBLIC_SOLANA_WS_URL
        value: wss://api.devnet.solana.com
      - key: NEXT_PUBLIC_USDC_MINT
        value: 4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU
      - key: NEXT_PUBLIC_MERIDIAN_PROGRAM_ID
        value: ERtAbZetHFVmFKyTzfJd9LdMGsqu5b2TWeWc65sikPaX
      - key: NEXT_PUBLIC_CIRCLE_FAUCET_URL
        value: https://faucet.circle.com
      - key: NEXT_PUBLIC_PYTH_HERMES_URL
        value: https://hermes.pyth.network
      - key: NEXT_PUBLIC_PYTH_FEED_AAPL
        value: 5a207c4aa0114baecf852fcd9db9beb8ec715f2db48caa525dbd878fd416fb09
      - key: NEXT_PUBLIC_PYTH_FEED_MSFT
        value: 8f98f8267ddddeeb61b4fd11f21dc0c2842c417622b4d685243fa73b5830131f
      - key: NEXT_PUBLIC_PYTH_FEED_GOOGL
        value: 88d0800b1649d98e21b8bf9c3f42ab548034d62874ad5d80e1c1b730566d7f61
      - key: NEXT_PUBLIC_PYTH_FEED_AMZN
        value: 82c59e36a8e0247e15283748d6cd51f5fa1019d73fbf3ab6d927e17d9e357a7f
      - key: NEXT_PUBLIC_PYTH_FEED_NVDA
        value: 61c4ca5b9731a79e285a01e24432d57d89f0ecdd4cd7828196ca8992d5eafef6
      - key: NEXT_PUBLIC_PYTH_FEED_META
        value: 399f1e8f1c4a517859963b56f104727a7a3c7f0f8fee56d34fa1f72e5a4b78ef
      - key: NEXT_PUBLIC_PYTH_FEED_TSLA
        value: 42676a595d0099c381687124805c8bb22c75424dffcaa55e3dc6549854ebe20a
