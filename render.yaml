services:
  - type: web
    name: meridian-automation
    runtime: node
    region: oregon
    plan: starter
    rootDir: automation
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TZ
        value: America/New_York
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: SOLANA_WS_URL
        value: wss://api.devnet.solana.com
      - key: SOLANA_CLUSTER
        value: devnet
      - key: USDC_MINT
        value: 4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU
      - key: PYTH_HERMES_URL
        value: https://hermes.pyth.network
