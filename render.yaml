        value: 5a207c4aa0114baecf852fcd9db9beb8ec715f2db48caa525dbd878fd416fb09
      - key: PYTH_FEED_MSFT
        value: 8f98f8267ddddeeb61b4fd11f21dc0c2842c417622b4d685243fa73b5830131f
      - key: PYTH_FEED_GOOGL
        value: 88d0800b1649d98e21b8bf9c3f42ab548034d62874ad5d80e1c1b730566d7f61
      - key: PYTH_FEED_AMZN
        value: 82c59e36a8e0247e15283748d6cd51f5fa1019d73fbf3ab6d927e17d9e357a7f
